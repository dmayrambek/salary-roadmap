<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Текущий отчёт — O!Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --pink:#E8005A; --pink-light:#ff4d92; --bg:#060608; --panel:#0b0b0e; --surface:#15151a;
  --text:#f2f2f2; --muted:#8a8a92; --border:rgba(255,255,255,0.10); --success:#34d399;
  --danger:#f87171; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px}
#app{max-width:100%;margin:0 auto;padding:18px 22px 60px}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:32px 28px}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:22px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--pink)}
.brand span{font-size:12px;color:var(--muted)}
.lockic{width:50px;height:50px;border-radius:13px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:23px;color:var(--pink-light);margin-bottom:16px}
h1{font-family:'Unbounded',sans-serif;font-weight:700;font-size:21px;line-height:1.25;margin-bottom:8px}
.sub{color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:22px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}
input[type=email]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font:inherit;font-size:15px}
input[type=email]:focus{outline:none;border-color:var(--pink)}
.btn{width:100%;margin-top:15px;border:none;background:var(--pink);color:#fff;border-radius:10px;padding:14px;font:inherit;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--pink-light)}
.btn:disabled{opacity:.55;cursor:default}
.note{margin-top:16px;font-size:12px;color:var(--muted);line-height:1.5}
.msg{margin-top:13px;font-size:13px;border-radius:10px;padding:11px 13px;display:none;line-height:1.45}
.msg.show{display:block}
.msg.err{background:rgba(248,113,113,.10);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.hbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:9px;padding:8px 13px;font:inherit;font-size:13px;cursor:pointer;transition:all .15s}
.hbtn:hover{border-color:var(--pink);color:var(--pink-light)}
.spacer{flex:1}
.who{font-size:12px;color:var(--muted)}
h2.title{font-family:'Unbounded',sans-serif;font-weight:500;font-size:22px;color:var(--pink);margin:14px 0 4px}
.updated{font-size:12px;color:var(--muted);margin-bottom:16px}
.tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.tab{font-size:12.5px;padding:8px 13px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:#c7c7cc;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text);border-color:var(--pink)}
.tab.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.cap{font-size:12.5px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.blocktitle{font-family:'Unbounded',sans-serif;font-weight:500;font-size:15px;margin:22px 0 10px}
.chartbox{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:6px 0 16px;height:340px;position:relative}
.blockrow{display:flex;gap:18px;flex-wrap:wrap;align-items:stretch;margin-bottom:18px}
.blockcol-tbl{flex:0 1 auto;min-width:0;max-width:calc(100% - 470px)}
.blockcol-pie{flex:0 0 440px;min-height:360px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative}
.tablewrap{border:1px solid var(--border);border-radius:10px;overflow:auto;max-width:100%}
table{border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--pink);color:#fff;font-weight:500;text-align:left;padding:8px 11px;white-space:normal;border:1px solid rgba(255,255,255,0.20);max-width:230px;overflow-wrap:break-word;vertical-align:bottom}
thead th.num{text-align:right;white-space:nowrap;max-width:none}
tbody td{padding:7px 11px;border:1px solid rgba(255,255,255,0.13);white-space:normal;vertical-align:top;max-width:230px;overflow-wrap:break-word}
tbody td.num{text-align:right;white-space:nowrap;max-width:none;font-variant-numeric:tabular-nums}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody tr.total td{font-weight:600;background:rgba(255,255,255,0.04)}
.controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 12px;min-width:280px}
.search i{color:var(--muted);font-size:15px}
.search input{background:none;border:none;color:var(--text);font:inherit;font-size:13.5px;width:100%;outline:none}
.count{font-size:12px;color:var(--muted)}
.pager{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
.pg{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font:inherit;font-size:12.5px}
.pg:hover{border-color:var(--pink)}
.pg.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.pg:disabled{opacity:.4;cursor:default}
.loading{color:var(--muted);padding:40px 0;text-align:center}
.piesums{font-size:13px;color:var(--text);margin:4px 0 20px}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="loading">Загрузка…</div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, isSignInWithEmailLink, sendSignInLinkToEmail, signInWithEmailLink, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

if(window.ChartDataLabels) Chart.register(window.ChartDataLabels);

const cfg={apiKey:"AIzaSyC2mbQOfdIA0ncUMhe8oS9IEr_ixT9SeAI",authDomain:"salary-roadmap.firebaseapp.com",projectId:"salary-roadmap",storageBucket:"salary-roadmap.firebasestorage.app",messagingSenderId:"879375192363",appId:"1:879375192363:web:eb719f2b49a516fb21b56e"};
const app=initializeApp(cfg); const db=getFirestore(app); const auth=getAuth(app);

const ALLOWED=/@(gts\.kg|obank\.kg)$/i;
const PAGE=25;
const PIE_COLORS=["#E8005A","#3b7fd4","#34d399","#f5a623","#9b59b6","#ff7f50","#1abc9c","#e84393","#00b894","#a29bfe","#fd79a8","#74b9ff","#e17055"];
const root=document.getElementById("root");
const esc=(s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const isNum=(v)=>typeof v==="number";
const toNum=(v)=>typeof v==="number"?v:(typeof v==="string"&&/^-?\d+(\.\d+)?$/.test(v)?parseFloat(v):0);
const fmtNum=(v)=>Number.isInteger(v)?v.toLocaleString("ru-RU"):v.toLocaleString("ru-RU",{maximumFractionDigits:2});
const fmt=(v)=>isNum(v)?fmtNum(v):esc(v);
const shareFmt=(v)=>v<=0?"0":(v<0.01?"<0,01":(Math.round(v*100)/100).toLocaleString("ru-RU",{maximumFractionDigits:2}));
const shortName=(v)=>String(v).replace(/^[\d.]+\s*-\s*/,"").trim();

let DATA=null; const state={}; let charts=[];
function clearCharts(){ charts.forEach(c=>{try{c.destroy()}catch(e){}}); charts=[]; }

/* ---------- вход ---------- */
function loginScreen(state2){
  const sent=state2&&state2.sent;
  root.innerHTML=`<div class="center"><div class="login">
    <div class="brand"><span class="dot"></span><span>O!Bank · Операционный блок</span></div>
    ${sent?`
      <div class="lockic" style="color:var(--success);background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.25)"><i class="ti ti-mail-check"></i></div>
      <h1>Проверьте почту</h1>
      <p class="sub">Ссылка для входа отправлена на <b>${esc(sent)}</b>. Откройте письмо и перейдите по ссылке — вернётесь сюда уже в отчёт.</p>
      <p class="note">Не пришло? Проверьте «Спам» или <a href="#" id="again" style="color:var(--pink-light)">введите почту заново</a>.</p>
    `:`
      <div class="lockic"><i class="ti ti-lock"></i></div>
      <h1>Текущий отчёт</h1>
      <p class="sub">Доступ для сотрудников O!Bank. Введите рабочую почту — пришлём ссылку для входа.</p>
      <label for="email">Рабочая почта</label>
      <input type="email" id="email" placeholder="name@gts.kg" autocomplete="email" />
      <div class="msg err" id="err"></div>
      <button class="btn" id="send"><i class="ti ti-mail"></i> Получить ссылку для входа</button>
      <p class="note">Пароль не нужен. Ссылка действует ограниченное время.</p>
    `}
  </div></div>`;
  if(sent){ document.getElementById("again").onclick=(e)=>{e.preventDefault();loginScreen();}; return; }
  const emailEl=document.getElementById("email"), errEl=document.getElementById("err"), btn=document.getElementById("send");
  const showErr=(m)=>{errEl.textContent=m;errEl.classList.add("show");};
  emailEl.addEventListener("keydown",e=>{if(e.key==="Enter")btn.click();});
  btn.onclick=async()=>{
    errEl.classList.remove("show");
    const email=emailEl.value.trim();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr("Введите корректный адрес почты.");
    if(!ALLOWED.test(email)) return showErr("Доступ только для почты @gts.kg или @obank.kg.");
    btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Отправляем…';
    try{
      const url=location.origin+location.pathname;
      await sendSignInLinkToEmail(auth,email,{url,handleCodeInApp:true});
      localStorage.setItem("reportSignInEmail",email);
      loginScreen({sent:email});
    }catch(e){ showErr("Не удалось отправить ссылку: "+(e.message||e)); btn.disabled=false; btn.innerHTML='<i class="ti ti-mail"></i> Получить ссылку для входа'; }
  };
}

/* ---------- данные ---------- */
async function ensureData(){
  if(DATA) return;
  const snap=await getDoc(doc(db,"report_current","data"));
  if(!snap.exists()) throw new Error("Данные отчёта не найдены.");
  DATA=JSON.parse(snap.data().payload);
}
function shell(user){
  return `<div id="app">
    <div class="topbar">
      <button class="hbtn" id="back"><i class="ti ti-arrow-left"></i> Назад</button>
      <button class="hbtn" id="home"><i class="ti ti-home"></i> Домой</button>
      <span class="spacer"></span><span class="who">${esc(user)}</span>
      <button class="hbtn" id="logout"><i class="ti ti-logout"></i> Выйти</button>
    </div>
    <h2 class="title">Текущий отчёт</h2>
    <div class="updated">Данные за ${esc(DATA.period||"")} · обновлено ${esc(DATA.updated||"")}</div>
    <div class="tabs" id="tabs"></div>
    <div id="content"></div>
  </div>`;
}
function renderTabs(activeId){
  document.getElementById("tabs").innerHTML=DATA.order.map(id=>{
    const s=DATA.sheets[id]; if(!s) return "";
    return `<span class="tab ${id===activeId?"active":""}" data-tab="${id}">${esc(s.name)}</span>`;
  }).join("");
  document.querySelectorAll("[data-tab]").forEach(t=>t.onclick=()=>{ location.hash=t.getAttribute("data-tab"); });
}
function tableHTML(columns,rows){
  const numcol=columns.map((c,i)=>rows.some(r=>isNum(r[i])));
  const head=columns.map((c,i)=>`<th class="${numcol[i]?"num":""}">${esc(c)}</th>`).join("");
  const body=rows.map(r=>{
    const isTotal=typeof r[0]==="string"&&/^(ИТОГО|Общий итог)/i.test(r[0]);
    const tds=r.map((v,i)=>{
      const disp=(columns[i]==="Доля, %"&&isNum(v))?shareFmt(v):fmt(v);
      return `<td class="${numcol[i]?"num":""}">${disp}</td>`;
    }).join("");
    return `<tr class="${isTotal?"total":""}">${tds}</tr>`;
  }).join("");
  return `<div class="tablewrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function pagerHTML(page,pages){
  let h=`<button class="pg" data-pg="prev" ${page===0?"disabled":""}>‹</button>`;
  const win=[]; for(let p=0;p<pages;p++){ if(p<3||p>=pages-1||Math.abs(p-page)<=1) win.push(p); }
  let last=-1; win.forEach(p=>{ if(p-last>1) h+=`<span>…</span>`; h+=`<button class="pg ${p===page?"active":""}" data-pg="${p}">${p+1}</button>`; last=p; });
  h+=`<button class="pg" data-pg="next" ${page>=pages-1?"disabled":""}>›</button>`; return h;
}
function tableModule(el,key,columns,rows){
  const st=state[key]||(state[key]={q:"",page:0}); const big=rows.length>30;
  function draw(){
    const q=st.q.trim().toLowerCase();
    const all=q?rows.filter(r=>r.some(v=>String(v).toLowerCase().includes(q))):rows;
    const pages=Math.max(1,Math.ceil(all.length/PAGE)); if(st.page>=pages)st.page=0;
    const slice=big?all.slice(st.page*PAGE,st.page*PAGE+PAGE):all;
    let h=""; if(big) h+=`<div class="controls"><div class="search"><i class="ti ti-search"></i><input id="q_${key}" placeholder="Поиск…" value="${esc(st.q)}"></div><span class="count">${all.length} из ${rows.length}</span></div>`;
    h+=tableHTML(columns,slice); if(big) h+=`<div class="pager">${pagerHTML(st.page,pages)}</div>`;
    el.innerHTML=h;
    if(big){
      const qi=el.querySelector(`#q_${key}`);
      qi.oninput=()=>{ st.q=qi.value; st.page=0; draw(); const n=el.querySelector(`#q_${key}`); n.focus(); n.setSelectionRange(n.value.length,n.value.length); };
      el.querySelectorAll("[data-pg]").forEach(b=>b.onclick=()=>{const v=b.getAttribute("data-pg"); if(v==="prev")st.page--;else if(v==="next")st.page++;else st.page=+v; draw();});
    }
  }
  draw();
}
/* графики */
function barBlock(canvasId,block){
  const ci=block.columns.length-1;
  const rows=block.rows.filter(r=>!/^(ИТОГО|Общий итог)/i.test(String(r[0])));
  const labels=rows.map(r=>shortName(r[0])); const values=rows.map(r=>toNum(r[ci]));
  charts.push(new Chart(document.getElementById(canvasId),{type:"bar",
    data:{labels,datasets:[{data:values,backgroundColor:"#E8005A",borderRadius:3}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},datalabels:{display:false},
        tooltip:{callbacks:{label:(c)=>c.parsed.x.toLocaleString("ru-RU")}}},
      scales:{x:{ticks:{color:"#8a8a92",callback:v=>v.toLocaleString("ru-RU")},grid:{color:"rgba(255,255,255,.06)"}},
              y:{ticks:{color:"#c7c7cc",font:{size:11}},grid:{display:false}}}}}));
}
function pieChart(canvasId,labels,values,topN){
  let L=labels.slice(), V=values.slice();
  if(topN && L.length>topN){
    const idx=V.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]);
    const keep=idx.slice(0,topN).map(x=>x[1]); const rest=idx.slice(topN).reduce((a,x)=>a+x[0],0);
    const nl=[],nv=[]; keep.forEach(i=>{nl.push(L[i]);nv.push(V[i]);}); nl.push("Прочие"); nv.push(rest); L=nl; V=nv;
  }
  const total=V.reduce((a,b)=>a+b,0)||1;
  charts.push(new Chart(document.getElementById(canvasId),{type:"pie",
    data:{labels:L,datasets:[{data:V,backgroundColor:PIE_COLORS,borderColor:"#0b0b0e",borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"right",labels:{color:"#c7c7cc",font:{size:11},boxWidth:12,padding:8,
        generateLabels:(chart)=>{const ds=chart.data.datasets[0];const tt=ds.data.reduce((a,b)=>a+b,0)||1;
          return chart.data.labels.map((l,i)=>{const p=ds.data[i]/tt*100;const pc=p<0.01?"<0,01":(Math.round(p*100)/100).toLocaleString("ru-RU",{maximumFractionDigits:2});
            return {text:l+" — "+pc+"%",fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],lineWidth:0,index:i};});}}},
        tooltip:{callbacks:{label:(c)=>c.label+": "+c.parsed.toLocaleString("ru-RU")+" ("+(c.parsed/total*100).toFixed(1)+"%)"}},
        datalabels:{color:"#fff",font:{size:11,weight:500},formatter:(v)=>{const p=v/total*100; return p>=4?p.toFixed(1)+"%":"";}}}}}));
}
function blockPie(canvasId,block,topN){
  const rows=block.rows.filter(r=>!/^(ИТОГО|Общий итог)/i.test(String(r[0])));
  const li=block.columns.indexOf("Наименование филиала")>=0?block.columns.indexOf("Наименование филиала"):0;
  const vi=block.columns.indexOf("ФОТ за 6 месяцев");
  pieChart(canvasId,rows.map(r=>String(r[li])),rows.map(r=>toNum(r[vi])),topN);
}
function blockTotal(block){
  const ci=block.columns.length-1;
  const r=block.rows.find(rr=>/^(ИТОГО|Общий итог)/i.test(String(rr[0])));
  return r?toNum(r[ci]):block.rows.reduce((a,rr)=>a+toNum(rr[ci]),0);
}
function recomputeShare(block){
  const di=block.columns.indexOf("Доля, %"), vi=block.columns.indexOf("ФОТ за 6 месяцев");
  if(di<0||vi<0) return;
  const tr=block.rows.find(r=>/^(ИТОГО|Общий итог)/i.test(String(r[0])));
  const total=tr?toNum(tr[vi]):block.rows.reduce((a,r)=>a+toNum(r[vi]),0);
  block.rows.forEach(r=>{
    if(/^(ИТОГО|Общий итог)/i.test(String(r[0]))){ r[di]=100; return; }
    r[di]= total?toNum(r[vi])/total*100:0;
  });
}
/* контент вкладки */
function renderContent(id){
  clearCharts();
  const s=DATA.sheets[id]; const c=document.getElementById("content");
  if(!s){ c.innerHTML="<div class='loading'>Лист не найден</div>"; return; }

  if(s.type==="placeholder"){ c.innerHTML=`<div class="loading">${esc(s.note||"Данные будут добавлены позже.")}</div>`; return; }

  if(s.type==="blocks"){
    const pieSheet=(id==="svod_fil"||id==="svod_otr");
    let h=""; s.blocks.forEach((b,bi)=>{
      h+=`<div class="blocktitle">${esc(b.title)}</div>`;
      if(pieSheet) h+=`<div class="blockrow"><div class="blockcol-tbl" id="tb_${id}_${bi}"></div><div class="blockcol-pie"><canvas id="ch_${id}_${bi}"></canvas></div></div>`;
      else if(id==="top10_fot") h+=`<div class="chartbox"><canvas id="ch_${id}_${bi}"></canvas></div><div id="tb_${id}_${bi}"></div>`;
      else h+=`<div id="tb_${id}_${bi}"></div>`;
    });
    if(id==="top10_fot"){
      h+=`<div class="blocktitle">Группа компаний и Топ-10</div>
          <div class="chartbox" style="max-width:760px"><canvas id="ch_bigpie"></canvas></div>
          <div class="piesums" id="pieSums"></div>`;
    }
    c.innerHTML=h;
    s.blocks.forEach((b,bi)=>{
      if(pieSheet) recomputeShare(b);
      tableModule(document.getElementById(`tb_${id}_${bi}`),`${id}_${bi}`,b.columns,b.rows);
      if(id==="top10_fot") barBlock(`ch_${id}_${bi}`,b);
      else if(pieSheet) blockPie(`ch_${id}_${bi}`,b, b.title.includes("виду деятельности")?8:null);
    });
    if(id==="top10_fot"){
      const gt=blockTotal(s.blocks[1]), t10=blockTotal(s.blocks[0]), tot=gt+t10||1;
      pieChart("ch_bigpie",["Группа компаний","Топ-10 компаний"],[gt,t10],null);
      document.getElementById("pieSums").innerHTML=
        `<b>Группа компаний:</b> ${fmtNum(gt)} (${(gt/tot*100).toFixed(1)}%) &nbsp;·&nbsp; <b>Топ-10 компаний:</b> ${fmtNum(t10)} (${(t10/tot*100).toFixed(1)}%)`;
    }
    return;
  }

  // обычная таблица (detalny, all_react, irregular)
  c.innerHTML=(s.caption?`<div class="cap">${esc(s.caption)}</div>`:"")+`<div id="tb_${id}"></div>`;
  tableModule(document.getElementById(`tb_${id}`),id,s.columns,s.rows);
}
function route(){
  const id=decodeURIComponent(location.hash.replace(/^#/,""))||DATA.order[0];
  renderTabs(id); renderContent(id);
}
async function showReport(user){
  try{ await ensureData(); }
  catch(e){ root.innerHTML=`<div class="center"><div class="login"><h1>Ошибка</h1><p class="sub">${esc(e.message||e)}</p></div></div>`; return; }
  root.innerHTML=shell(user);
  document.getElementById("back").onclick=()=>history.back();
  document.getElementById("home").onclick=()=>{ location.hash=DATA.order[0]; };
  document.getElementById("logout").onclick=async()=>{ await signOut(auth); location.hash=""; };
  window.addEventListener("hashchange",route);
  route();
}
(async()=>{
  if(isSignInWithEmailLink(auth,location.href)){
    let email=localStorage.getItem("reportSignInEmail");
    if(!email) email=window.prompt("Подтвердите почту, на которую пришла ссылка:");
    try{ await signInWithEmailLink(auth,email,location.href); localStorage.removeItem("reportSignInEmail");
      history.replaceState(null,"",location.origin+location.pathname); }
    catch(e){ loginScreen(); return; }
  }
  onAuthStateChanged(auth,user=>{
    if(user && ALLOWED.test(user.email||"")) showReport(user.email);
    else if(user){ signOut(auth); loginScreen(); }
    else loginScreen();
  });
})();
</script>
</body>
</html>
